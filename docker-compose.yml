services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: founderos
      POSTGRES_PASSWORD: founderos
      POSTGRES_DB: founderos
    ports: ["5434:5432"]
    volumes: ["founderos-postgres:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U founderos"]
      interval: 5s
      timeout: 5s
      retries: 10
  redis:
    image: redis:7-alpine
    ports: ["6380:6379"]
    command: redis-server --appendonly yes
    volumes: ["founderos-redis:/data"]
volumes:
  founderos-postgres:
  founderos-redis:
